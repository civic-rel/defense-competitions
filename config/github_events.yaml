# GitHub-source event-to-query mapping.
#
# Each top-level key under `events:` is an event_id that must
# ALREADY exist in the store (created by another adapter — e.g.,
# sources.xtech). Under each event, list either:
#
#   - query: <free-text GitHub search>
#       e.g.  - query: xtech natsec hackathon
#
#   - topic: <github topic tag>
#       The topic tag becomes `topic:<tag>` in the GitHub search.
#       Matching opt-in topics earns 'confirmed' confidence.
#
# Find event_ids by running:
#     python -c "from store import cache; \
#                rows=[(r['id'],r['name']) for r in cache.connect().__enter__().execute('SELECT id,name FROM events')]; \
#                print('\n'.join(f'{i}  {n}' for i,n in rows))"
#
# The hand-rolled parser is intentionally simple — same approach
# as config/recap_sources.yaml. If you need real YAML features
# (anchors, multi-line strings), swap in pyyaml.

events:

  # xTech National Security Hackathon — replace this placeholder
  # event_id with the actual one once sources.xtech has ingested
  # the event. Until then, this entry is inert (the github adapter
  # will warn "event_id not in store" and skip).
  xtech_natsec_hackathon_2026:
    - query: xtech natsec hackathon
    - query: xtech national security
    - query: army hackathon natsec
    - topic: xtech-hackathon
    - topic: natsec-hackathon
